name: codeway_image_processor
description: Intelligent image processing app with face detection and document scanning
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management & Navigation
  get: ^4.7.2

  # ML Kit - Detection
  google_mlkit_face_detection: ^0.12.0
  google_mlkit_text_recognition: ^0.14.0

  # Camera & Image Source
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Image Processing (Pure Dart - runs in isolates)
  image: ^4.3.0

  # PDF Generation
  pdf: ^3.11.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # File System & Permissions
  path_provider: ^2.1.5
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  share_plus: ^10.1.3
  open_file: ^3.5.7

  # Notifications
  flutter_local_notifications: ^18.0.1

  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
